[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["./.git", "./.venv", "./.cursor"]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = []

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
strict = false
warn_unused_ignores = false
exclude = ["\\.venv", "\\.git", "\\.cursor"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

